<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3DGS Custom Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #canvas-container { width: 100vw; height: 100vh; }
        .ui-overlay { position: absolute; top: 20px; left: 20px; z-index: 100; color: white; font-family: sans-serif; }
        #file-open-btn {
            padding: 6px 14px; border: 1px solid #666; border-radius: 4px;
            background: rgba(255,255,255,0.15); color: white; cursor: pointer; font-size: 13px;
        }
        #file-open-btn:hover { background: rgba(255,255,255,0.3); }
        #reset-view-btn {
            margin-left: 6px; padding: 6px 14px; border: 1px solid #666; border-radius: 4px;
            background: rgba(255,255,255,0.15); color: white; cursor: pointer; font-size: 13px;
        }
        #reset-view-btn:hover { background: rgba(255,255,255,0.3); }
        #flip-controls { margin-top: 8px; display: flex; gap: 4px; }
        #flip-controls button {
            padding: 4px 12px; border: 1px solid #666; border-radius: 4px;
            background: rgba(255,255,255,0.15); color: white; cursor: pointer; font-size: 13px;
        }
        #flip-controls button:hover { background: rgba(255,255,255,0.3); }
        #flip-controls button.active { background: rgba(0,180,255,0.5); border-color: #0af; }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; z-index: 100; }
        #hud-toggle-btn {
            margin-top: 8px; padding: 4px 12px; border: 1px solid #666; border-radius: 4px;
            background: rgba(255,255,255,0.15); color: white; cursor: pointer; font-size: 13px;
        }
        #hud-toggle-btn:hover { background: rgba(255,255,255,0.3); }
        #hud-toggle-btn.active { background: rgba(0,180,255,0.3); border-color: #0af; }
        #camera-settings-toggle {
            margin-left: 6px; padding: 4px 12px; border: 1px solid #666; border-radius: 4px;
            background: rgba(255,255,255,0.15); color: white; cursor: pointer; font-size: 13px;
        }
        #camera-settings-toggle:hover { background: rgba(255,255,255,0.3); }
        #camera-settings-panel {
            position: relative; margin-top: 6px; padding: 10px 12px; border: 1px solid #555; border-radius: 6px;
            background: rgba(0,0,0,0.6); font-size: 13px;
        }
        #cam-close {
            position: absolute; top: 4px; right: 6px; background: none; border: none;
            color: #aaa; cursor: pointer; font-size: 14px; line-height: 1; padding: 0;
        }
        #cam-close:hover { color: white; }
        #camera-settings-panel.hidden { display: none; }
        .cam-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .cam-row label { width: 40px; color: #ccc; }
        .cam-row input {
            width: 72px; padding: 2px 6px; border: 1px solid #555; border-radius: 3px;
            background: rgba(255,255,255,0.1); color: white; font-size: 13px;
        }
        .cam-buttons { display: flex; gap: 6px; margin-top: 4px; }
        .cam-buttons button {
            flex: 1; padding: 4px; border: 1px solid #666; border-radius: 4px;
            color: white; cursor: pointer; font-size: 12px;
        }
        #cam-default { background: rgba(255,200,0,0.2); color: #ffd; }
        #cam-default:hover { background: rgba(255,200,0,0.4); }
        #cam-ok { background: rgba(0,200,80,0.2); color: #afa; }
        #cam-ok:hover { background: rgba(0,200,80,0.4); }
        #cam-cancel { background: rgba(200,80,80,0.2); color: #faa; }
        #cam-cancel:hover { background: rgba(200,80,80,0.4); }

        /* File name display */
        #file-name-display {
            margin-top: 6px; max-width: 260px; word-break: break-all;
        }
        #file-name-display:empty { display: none; }

        /* Loading overlay */
        #loading-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(0,0,0,0.6);
            z-index: 200; color: white; font-family: sans-serif;
        }
        #loading-overlay.hidden { display: none; }
        #loading-overlay.error { background: rgba(0,0,0,0.75); }
        .loading-spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        #loading-overlay.error .loading-spinner { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-message { font-size: 15px; color: #ddd; }
        .loading-error-icon {
            display: none; font-size: 40px; margin-bottom: 12px;
        }
        #loading-overlay.error .loading-error-icon { display: block; }
        .loading-error-msg { color: #f88; font-size: 15px; margin-bottom: 16px; }
        .loading-error-msg { display: none; }
        #loading-overlay.error .loading-error-msg { display: block; }
        #loading-close-btn {
            display: none; padding: 6px 20px; border: 1px solid #888; border-radius: 4px;
            background: rgba(255,255,255,0.15); color: white; cursor: pointer; font-size: 13px;
        }
        #loading-close-btn:hover { background: rgba(255,255,255,0.3); }
        #loading-overlay.error #loading-close-btn { display: block; }

        /* HUD overlay */
        #hud-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 50;
        }
        #hud-overlay.hidden { display: none; }
        .hud-horizon {
            position: absolute; top: 50%; left: calc(50% - 10vh);
            width: 20vh; height: 1px;
            background: rgba(255,255,255,0.12);
            transform: translateY(-50%);
        }
        .hud-vertical {
            position: absolute; top: calc(50% - 10vh); left: 50%;
            width: 1px; height: 20vh;
            background: rgba(255,255,255,0.12);
            transform: translateX(-50%);
        }
        .hud-crosshair-h {
            position: absolute; top: 50%; left: calc(50% - 18px);
            width: 36px; height: 1px;
            background: rgba(255,255,255,0.85);
            transform: translateY(-50%);
            box-shadow: 0 0 3px rgba(0,0,0,0.6);
        }
        .hud-crosshair-v {
            position: absolute; top: calc(50% - 10px); left: 50%;
            width: 1px; height: 20px;
            background: rgba(255,255,255,0.85);
            transform: translateX(-50%);
            box-shadow: 0 0 3px rgba(0,0,0,0.6);
        }
        .hud-dot {
            position: absolute; top: 50%; left: 50%;
            width: 4px; height: 4px; border-radius: 50%;
            background: rgba(255,255,255,0.95);
            transform: translate(-50%, -50%);
            box-shadow: 0 0 3px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

<div class="ui-overlay">
    <button id="file-open-btn" title="対応形式: .ply, .splat, .spz, .ksplat, .sog">ファイルを開く</button>
    <button id="reset-view-btn">表示リセット</button>
    <div id="file-name-display"></div>
    <div id="flip-controls">
        <button data-axis="x">Flip X</button>
        <button data-axis="y">Flip Y</button>
        <button data-axis="z">Flip Z</button>
    </div>
    <button id="hud-toggle-btn">HUD</button>
    <button id="camera-settings-toggle">Camera Settings</button>
    <div id="camera-settings-panel" class="hidden">
        <button id="cam-close">✕</button>
        <div class="cam-row"><label>FOV</label><input id="cam-fov" type="number" step="1" min="1" max="179"></div>
        <div class="cam-row"><label>Zoom</label><input id="cam-zoom" type="number" step="0.1" min="0.1"></div>
        <div class="cam-row"><label>Speed</label><input id="cam-speed" type="number" step="0.1" min="0.1"></div>
        <div class="cam-buttons">
            <button id="cam-default">Default</button>
            <button id="cam-ok">OK</button>
            <button id="cam-cancel">Cancel</button>
        </div>
    </div>
</div>

<div id="loading-overlay" class="hidden">
    <div class="loading-spinner"></div>
    <div class="loading-error-icon">⚠️</div>
    <div class="loading-message">読み込み中...</div>
    <div class="loading-error-msg" id="loading-error-text">読み込みに失敗しました</div>
    <button id="loading-close-btn">閉じる</button>
</div>

<div id="hud-overlay" class="hidden">
    <div class="hud-horizon"></div>
    <div class="hud-vertical"></div>
    <div class="hud-crosshair-h"></div>
    <div class="hud-crosshair-v"></div>
    <div class="hud-dot"></div>
</div>

<div id="joystick-zone"></div>
<div id="canvas-container"></div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
